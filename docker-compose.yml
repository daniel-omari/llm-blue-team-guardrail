services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: guardrail
      POSTGRES_PASSWORD: guardrail
      POSTGRES_DB: guardrail
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guardrail"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://guardrail:guardrail@db:5432/guardrail
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-claude-haiku-4-5-20251001}
      CORS_ORIGINS: http://localhost:8080
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: /api
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  pgdata:
